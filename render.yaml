# Render Blueprint — backend API + PostgreSQL.
# The frontend is deployed separately on Vercel.
# In the Render dashboard: New + → Blueprint → pick this repo. It reads this file.
services:
  - type: web
    name: truelancer-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Connection string is injected automatically from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: truelancer-db
          property: connectionString
      # Auto-generated strong secrets (you never see/need them)
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # Secrets you paste in the dashboard (sync:false = not stored in git)
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Set after the services get their URLs (see DEPLOYMENT.md)
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: truelancer-db
    plan: free
