# Render Blueprint — backend API only (no database here).
# The PostgreSQL database lives on Neon (free, no card); paste its connection
# string into DATABASE_URL in the Render dashboard. The frontend is hosted on
# Hostinger. See DEPLOYMENT.md.
services:
  - type: web
    name: truelancer-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Auto-generated strong secrets (you never see/need them)
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # Secrets you paste in the dashboard (sync:false = never stored in git)
      - key: DATABASE_URL          # Neon connection string
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Set after the frontend/API URLs are known (see DEPLOYMENT.md)
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL          # your Hostinger site URL
        sync: false
